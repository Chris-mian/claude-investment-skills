name: 13F Firehose (Famous Funds Daily)

# Daily scan for new 13F-HR filings from a curated list of famous funds
# (Leopold/Situational Awareness, Berkshire, Pershing Square, NVIDIA Corp, etc.).
#
# 13F-HR is filed quarterly, within 45 days of quarter-end:
#   Q1 → May 15      Q2 → Aug 14      Q3 → Nov 14      Q4 → Feb 14
#
# Filings flurry in the 3 days before each deadline. Schedule is two-tier:
#
# NORMAL weekdays — 4x daily (every 4h during US hours):
#   09:00 UTC = 5 AM ET   13:00 UTC = 9 AM ET
#   17:00 UTC = 1 PM ET   21:00 UTC = 5 PM ET
#
# DEADLINE WEEK — extra runs fill the gaps → 8x daily (every 2h, 5am–7pm ET):
#   Q1: May  13-15   Q2: Aug 12-14   Q3: Nov 12-14   Q4: Feb 12-14
#   Extra slots: 11:00 UTC (7 AM ET), 15:00 UTC (11 AM ET),
#                19:00 UTC (3 PM ET), 23:00 UTC (7 PM ET)
#
# SEC EDGAR doesn't accept weekend submissions, so we skip Sat/Sun.
# State dedup is via committed state.json (per-fund last-seen accession).

on:
  schedule:
    # ── Normal weekdays: 4x daily ──────────────────────────────────────────
    - cron: '0  9 * * 1-5'  #  5 AM ET / 09:00 UTC
    - cron: '0 13 * * 1-5'  #  9 AM ET / 13:00 UTC
    - cron: '0 17 * * 1-5'  #  1 PM ET / 17:00 UTC
    - cron: '0 21 * * 1-5'  #  5 PM ET / 21:00 UTC
    # ── Deadline week: 4 extra runs (fills gaps → every 2h) ────────────────
    # Q1 deadline window: May 13-15
    - cron: '0 11 13-15 5 1-5'   #  7 AM ET
    - cron: '0 15 13-15 5 1-5'   # 11 AM ET
    - cron: '0 19 13-15 5 1-5'   #  3 PM ET
    - cron: '0 23 13-15 5 1-5'   #  7 PM ET
    # Q2 deadline window: Aug 12-14
    - cron: '0 11 12-14 8 1-5'
    - cron: '0 15 12-14 8 1-5'
    - cron: '0 19 12-14 8 1-5'
    - cron: '0 23 12-14 8 1-5'
    # Q3 deadline window: Nov 12-14
    - cron: '0 11 12-14 11 1-5'
    - cron: '0 15 12-14 11 1-5'
    - cron: '0 19 12-14 11 1-5'
    - cron: '0 23 12-14 11 1-5'
    # Q4 deadline window: Feb 12-14
    - cron: '0 11 12-14 2 1-5'
    - cron: '0 15 12-14 2 1-5'
    - cron: '0 19 12-14 2 1-5'
    - cron: '0 23 12-14 2 1-5'
  workflow_dispatch:
    inputs:
      priority_max:
        description: 'Only scan funds with priority <= this (1=top, 3=all)'
        required: false
        default: '3'
      force_rescan:
        description: 'Re-emit alerts even for already-seen accessions'
        required: false
        default: 'false'
      test_mode:
        description: 'Test mode (print to log, do NOT send Telegram)'
        required: false
        default: 'false'

permissions:
  contents: write  # to commit state file back

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet 'requests>=2.31'

      - name: Run 13F scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          PRIORITY_MAX:       ${{ inputs.priority_max || '3' }}
          FORCE_RESCAN:       ${{ inputs.force_rescan == 'true' && '1' || '' }}
          TEST_MODE:          ${{ inputs.test_mode == 'true' && '1' || '' }}
          EDGAR_USER_AGENT:   "ssurmiczizhao@gmail.com 13f-firehose/1.0 (ci)"
        run: |
          python 13f-firehose/scripts/13f_firehose.py

      - name: Commit updated state (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain 13f-firehose/scripts/state.json)" ]]; then
            git add 13f-firehose/scripts/state.json
            git commit -m "13f-firehose: state checkpoint ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "No state changes to commit."
          fi
